<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>ToolsFast - Breaking News, In-Depth Analysis and Expert Reporting</title>
    <meta name="description" content="ToolsFast delivers breaking news, investigative reporting, and expert analysis across technology, world affairs, finance, politics, health, science, and sports.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

    <style>
        /* Logo Styling */
        .css-logo-container { display: flex; align-items: center; text-decoration: none; gap: 10px; }
        .css-logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #0a3d62, #3c6382); color: #fff; font-weight: 900; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
        .css-logo-text { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 24px; color: #1e272e; }
        .css-logo-text span { color: #3c6382; }

        /* News Card Styling */
        .news-card { border: 1px solid #eee; border-radius: 12px; overflow: hidden; background: #fff; transition: 0.3s; height: 100%; }
        .news-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 15px; }
        .card-cat { background: #3c6382; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .card-title { font-size: 18px; margin: 10px 0; color: #111; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-meta { color: #888; font-size: 12px; }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-wrap" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px;">
            <a href="/" class="css-logo-container">
                <div class="css-logo-icon">T</div>
                <div class="css-logo-text">Tools<span>Fast</span></div>
            </a>
            <div id="headerDate" style="font-size: 14px; color: #666;"></div>
        </div>
    </header>

    <main class="site-main">
        <div class="main-wrap" style="max-width: 1200px; margin: auto; padding: 20px;">
            <section class="content-section">
                <div class="section-head" style="margin-bottom: 20px; border-bottom: 2px solid #0a3d62; padding-bottom: 10px;">
                    <h2 style="margin: 0; color: #0a3d62;">Latest Stories</h2>
                </div>
                <div id="latestGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px;">
                    <p style="text-align: center; grid-column: 1/-1;">Checking for new stories...</p>
                </div>
            </section>
        </div>
    </main>

    <footer class="site-footer" style="background: #1e272e; color: #fff; padding: 40px 20px; margin-top: 50px; text-align: center;">
        <p>&copy; 2026 ToolsFast. All rights reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Update Date
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-US', options);

            // Fetch News Data (Added cache buster to see updates instantly)
            fetch('data/articles.json?t=' + new Date().getTime())
                .then(response => response.json())
                .then(data => {
                    const grid = document.getElementById('latestGrid');
                    if (!data || data.length === 0) {
                        grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 50px;">News is being generated. Please refresh in 5 minutes.</p>';
                        return;
                    }

                    let html = '';
                    data.forEach(article => {
                        html += `
                        <div class="news-card">
                            <a href="news/${article.slug}.html" style="text-decoration:none; color:inherit;">
                                <img src="${article.image}" class="card-img" onerror="this.src='https://images.unsplash.com/photo-1504711434969-e33886168d7c?w=800'">
                                <div class="card-body">
                                    <span class="card-cat">${article.category}</span>
                                    <h3 class="card-title">${article.title}</h3>
                                    <div class="card-meta">
                                        <i class="far fa-user"></i> ${article.author} | 
                                        <i class="far fa-clock"></i> ${new Date(article.published_at).toLocaleDateString()}
                                    </div>
                                </div>
                            </a>
                        </div>`;
                    });
                    grid.innerHTML = html;
                })
                .catch(err => {
                    console.error("Fetch error:", err);
                    document.getElementById('latestGrid').innerHTML = '<p style="grid-column:1/-1; text-align:center;">Updates coming soon...</p>';
                });
        });
    </script>
</body>
</html>
