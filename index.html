<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolsFast | Global Investigative News</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; background: #f4f7f6; color: #1a1a1a; }
        .nav { background: #0a3d62; color: white; padding: 15px; text-align: center; font-weight: bold; letter-spacing: 1px; }
        .container { max-width: 1100px; margin: 40px auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 20px; }
        .category { background: #0a3d62; color: white; padding: 3px 10px; border-radius: 4px; font-size: 10px; text-transform: uppercase; }
        .title { font-size: 18px; margin: 15px 0; font-weight: 800; line-height: 1.4; }
        a { text-decoration: none; color: inherit; }
    </style>
</head>
<body>
    <div class="nav">TOOLSFAST GLOBAL NEWS</div>
    <div class="container">
        <h2 style="border-left: 5px solid #0a3d62; padding-left: 15px; margin-bottom: 30px;">LATEST REPORTS</h2>
        <div id="newsGrid" class="grid">Loading latest investigative reports...</div>
    </div>

    <script>
        // Cache buster: ?v= + Timestamp forces the browser to bypass old data
        fetch('data/articles.json?v=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('newsGrid');
                if(!data || data.length === 0) { grid.innerHTML = "News is being generated..."; return; }
                grid.innerHTML = data.map(art => `
                    <div class="card">
                        <a href="news/${art.slug}.html">
                            <img src="${art.image}">
                            <div class="card-content">
                                <span class="category">${art.category}</span>
                                <div class="title">${art.title}</div>
                                <div style="font-size:12px; color:#888;">${new Date(art.published_at).toDateString()}</div>
                            </div>
                        </a>
                    </div>
                `).join('');
            });
    </script>
</body>
</html>
