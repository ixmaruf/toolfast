<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F7FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB" />
      <stop offset="100%" style="stop-color:#06B6D4" />
    </linearGradient>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB" />
      <stop offset="100%" style="stop-color:#06B6D4" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="1100" cy="100" r="200" fill="#2563EB" opacity="0.03"/>
  <circle cx="100" cy="530" r="150" fill="#06B6D4" opacity="0.03"/>
  
  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>
  
  <!-- Logo icon -->
  <rect x="80" y="200" width="72" height="72" rx="18" fill="url(#iconBg)"/>
  <text x="116" y="248" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">⚡</text>
  
  <!-- Brand name -->
  <text x="170" y="238" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="900" fill="#1A1A1A">Tools</text>
  <text x="323" y="238" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="900" fill="#2563EB">fast</text>
  
  <!-- Main title -->
  <text x="80" y="330" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="800" fill="#1A1A1A">Free Video Downloader</text>
  
  <!-- Subtitle -->
  <text x="80" y="390" font-family="Inter, Arial, sans-serif" font-size="28" fill="#6B7280">TikTok • Instagram • Facebook — HD, No Watermark</text>
  
  <!-- Features row -->
  <rect x="80" y="440" width="160" height="44" rx="22" fill="#DBEAFE"/>
  <text x="160" y="468" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#2563EB" text-anchor="middle">✓ 100% Free</text>
  
  <rect x="260" y="440" width="200" height="44" rx="22" fill="#D1FAE5"/>
  <text x="360" y="468" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#059669" text-anchor="middle">✓ No Watermark</text>
  
  <rect x="480" y="440" width="160" height="44" rx="22" fill="#FEF3C7"/>
  <text x="560" y="468" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#D97706" text-anchor="middle">✓ HD Quality</text>
  
  <rect x="660" y="440" width="190" height="44" rx="22" fill="#FCE7F3"/>
  <text x="755" y="468" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#DB2777" text-anchor="middle">✓ No Sign-Up</text>
  
  <!-- URL -->
  <text x="80" y="560" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" fill="#2563EB">toolsfast.online</text>
  
  <!-- Bottom accent line -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#accent)"/>
</svg>
