<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Search - ToolsFast</title>
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Merriweather:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header" id="siteHeader">
        <div class="header-wrap">
            <div class="header-top">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggle" aria-label="Menu"><i class="fas fa-bars"></i></button>
                    <a href="/" class="site-logo">
                        <img src="images/logo.png" alt="ToolsFast" class="logo-icon">
                        <span class="logo-name">ToolsFast</span>
                    </a>
                </div>
                <div class="header-right">
                    <div class="search-wrapper">
                        <input type="text" id="searchInput" placeholder="Search news..." autocomplete="off">
                        <button id="searchBtn" aria-label="Search"><i class="fas fa-search"></i></button>
                    </div>
                </div>
            </div>
            <nav class="site-nav" id="siteNav">
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="category.html?cat=world">World</a></li>
                    <li><a href="category.html?cat=technology">Technology</a></li>
                    <li><a href="category.html?cat=finance">Finance</a></li>
                    <li><a href="category.html?cat=politics">Politics</a></li>
                    <li><a href="category.html?cat=science">Science</a></li>
                    <li><a href="category.html?cat=health">Health</a></li>
                    <li><a href="category.html?cat=sports">Sports</a></li>
                    <li><a href="category.html?cat=ai">AI</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="site-main">
        <div class="main-wrap">
            <div class="search-hero">
                <div class="search-query-display">Search results for: <span id="searchQuery"></span></div>
                <div class="search-count" id="searchCount"></div>
            </div>
            <div class="search-results" id="searchResults"></div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-wrap">
            <div class="footer-bottom"><p>Copyright <span id="footerYear">2026</span> ToolsFast. All rights reserved.</p></div>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/seo.js"></script>
    <script src="js/ads.js"></script>
    <script>
    const SEARCH_PAGE = {
        async init() {
            this.setupCommon();
            const q = new URLSearchParams(window.location.search).get('q') || '';
            document.getElementById('searchQuery').textContent = q;
            document.getElementById('searchInput').value = q;
            document.title = `Search: ${q} - ToolsFast`;
            if (q) await this.search(q);
        },
        setupCommon() {
            document.getElementById('footerYear').textContent = new Date().getFullYear();
            const toggle = document.getElementById('menuToggle');
            const nav = document.getElementById('siteNav');
            if (toggle && nav) { toggle.addEventListener('click', () => { nav.classList.toggle('open'); toggle.querySelector('i').className = nav.classList.contains('open') ? 'fas fa-times' : 'fas fa-bars'; }); }
            const input = document.getElementById('searchInput');
            const btn = document.getElementById('searchBtn');
            if (input && btn) { const go = () => { const q2 = input.value.trim(); if (q2) window.location.href = `search.html?q=${encodeURIComponent(q2)}`; }; btn.addEventListener('click', go); input.addEventListener('keypress', e => { if (e.key === 'Enter') go(); }); }
            const header = document.getElementById('siteHeader');
            if (header) { window.addEventListener('scroll', () => header.classList.toggle('scrolled', window.scrollY > 100), { passive: true }); }
        },
        async search(query) {
            let articles = [];
            try {
                const res = await fetch(`tables/articles?limit=100&search=${encodeURIComponent(query)}`);
                const data = await res.json();
                articles = data.data || [];
            } catch (e) {
                articles = this.getDemos().filter(a => (a.title + ' ' + (a.excerpt || '')).toLowerCase().includes(query.toLowerCase()));
            }
            document.getElementById('searchCount').textContent = `${articles.length} result${articles.length !== 1 ? 's' : ''} found`;
            const container = document.getElementById('searchResults');
            if (articles.length === 0) {
                container.innerHTML = '<p style="color:var(--text-tertiary);padding:40px 0;text-align:center;">No articles found matching your search. Try different keywords.</p>';
                return;
            }
            container.innerHTML = articles.map(a => {
                const cat = getCategoryInfo(a.category);
                return `
                    <a href="article.html?id=${a.id}" class="search-result-card">
                        <div class="search-result-img"><img src="${a.image || getDefaultImage(a.category)}" alt="${a.title}" loading="lazy"></div>
                        <div class="search-result-body">
                            <span class="cat-label" style="--cat-color:${cat.color};margin-bottom:6px;">${cat.name}</span>
                            <h3>${a.title}</h3>
                            <p>${a.excerpt || ''}</p>
                            <div class="card-meta"><span>${timeAgo(a.created_at || new Date().toISOString())}</span><span>${formatNumber(a.views || 0)} views</span></div>
                        </div>
                    </a>`;
            }).join('');
        },
        getDemos() {
            const now = Date.now();
            return [
                { id: 'demo-1', title: 'Federal Reserve Signals Potential Rate Cut Amid Cooling Inflation Data', excerpt: 'The Federal Reserve indicated it may lower interest rates as inflation trends closer to its two percent target.', category: 'finance', image: 'https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=1200&q=85', views: 48200, created_at: new Date(now - 1800000).toISOString() },
                { id: 'demo-2', title: 'Apple Unveils Next-Generation M5 Chip With Breakthrough AI Processing', excerpt: 'Apple\'s newest silicon represents a fundamental leap in on-device AI.', category: 'technology', image: 'https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=1200&q=85', views: 35600, created_at: new Date(now - 3600000).toISOString() }
            ];
        }
    };
    document.addEventListener('DOMContentLoaded', () => SEARCH_PAGE.init());
    </script>
</body>
</html>
