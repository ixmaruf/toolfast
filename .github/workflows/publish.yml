name: News Bot Automation

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python news_engine.py

      - name: Force Push Updates
        run: |
          git config --user.name "github-actions[bot]"
          git config --user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Site Update: New Content Generated" || echo "No changes to commit"
          git push origin main
