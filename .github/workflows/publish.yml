name: ToolsFast Auto-Publisher

on:
  # Run every 60 minutes
  schedule:
    - cron: '0 * * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      articles_count:
        description: 'Number of articles to generate (1-5)'
        required: false
        default: '3'

# Cancel any in-progress runs when a new one starts
concurrency:
  group: news-publisher
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
      GROQ_KEY_1: ${{ secrets.GROQ_KEY_1 }}
      GROQ_KEY_2: ${{ secrets.GROQ_KEY_2 }}
      PEXELS_KEY: ${{ secrets.PEXELS_KEY }}
      PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}
      BING_INDEXNOW_KEY: ${{ secrets.BING_INDEXNOW_KEY }}

    steps:
      # 1. Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Create required directories
      - name: Create directories
        run: |
          mkdir -p articles
          mkdir -p images/articles
          mkdir -p data
          mkdir -p logs

      # 4. Run the news engine
      - name: Run ToolsFast News Engine
        run: |
          echo "Starting ToolsFast News Engine..."
          echo "Time: $(date -u)"
          python news_engine.py
          echo "Engine finished at: $(date -u)"

      # 5. Generate articles index page (for browsing all articles)
      - name: Generate articles index
        run: |
          python -c "
          import json, os
          from pathlib import Path

          data_file = Path('data/articles.json')
          if not data_file.exists():
              print('No articles data found')
              exit(0)

          with open(data_file, 'r') as f:
              articles = json.load(f)

          # Sort by date, newest first
          articles.sort(key=lambda a: a.get('published_at', ''), reverse=True)

          # Build index for the main site to read
          index_data = []
          for art in articles[:100]:
              index_data.append({
                  'id': art.get('slug', ''),
                  'title': art.get('title', ''),
                  'excerpt': art.get('excerpt', ''),
                  'category': art.get('category', 'world'),
                  'author': art.get('author', 'ToolsFast Editorial'),
                  'image': art.get('image', ''),
                  'tags': art.get('tags', []),
                  'word_count': art.get('word_count', 5000),
                  'views': art.get('views', 0),
                  'is_featured': art.get('is_featured', False),
                  'is_breaking': art.get('is_breaking', False),
                  'is_viral': art.get('is_viral', False),
                  'published_at': art.get('published_at', ''),
                  'url': f\"articles/{art.get('slug', '')}.html\"
              })

          with open('data/articles_index.json', 'w') as f:
              json.dump(index_data, f, indent=2, ensure_ascii=False)

          print(f'Articles index generated: {len(index_data)} articles')
          "

      # 6. Verify output
      - name: Verify published articles
        run: |
          echo "=== Published Articles ==="
          ls -la articles/ 2>/dev/null || echo "No articles directory"
          echo ""
          echo "=== Article Count ==="
          find articles -name "*.html" 2>/dev/null | wc -l || echo "0"
          echo ""
          echo "=== Data Files ==="
          ls -la data/ 2>/dev/null || echo "No data directory"
          echo ""
          echo "=== Sitemap ==="
          head -20 sitemap.xml 2>/dev/null || echo "No sitemap"
          echo ""
          echo "=== Engine Log (last 30 lines) ==="
          tail -30 logs/engine.log 2>/dev/null || echo "No log file"

      # 7. Commit and push changes
      - name: Commit and push
        run: |
          git config --global user.name "ToolsFast Bot"
          git config --global user.email "bot@toolsfast.online"

          git add -A

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          ARTICLE_COUNT=$(find articles -name "*.html" 2>/dev/null | wc -l)
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")

          git commit -m "Auto-publish: ${ARTICLE_COUNT} articles | ${TIMESTAMP}"
          git push origin main

          echo "Changes pushed successfully"

      # 8. Summary
      - name: Job summary
        run: |
          echo "## ToolsFast Auto-Publisher Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          TOTAL=$(find articles -name "*.html" 2>/dev/null | wc -l)
          echo "**Total articles published:** ${TOTAL}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f data/articles.json ]; then
            echo "**Database entries:** $(python -c 'import json; print(len(json.load(open("data/articles.json"))))')" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Sitemap:** Updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**IndexNow:** Pinged" >> $GITHUB_STEP_SUMMARY
