<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Page Not Found | Toolsfast.online</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" type="image/svg+xml" href="https://toolsfast.online/assets/images/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{primary:'#2563EB','primary-dark':'#1D4ED8','primary-light':'#3B82F6',accent:'#06B6D4',dark:'#1A1A1A','gray-custom':'#6B7280'},fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}</script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',system-ui,sans-serif;background:#fff;color:#1A1A1A;display:flex;align-items:center;justify-content:center;min-height:100dvh;text-align:center;padding:20px;}
        .countdown{font-variant-numeric:tabular-nums;color:#2563EB;font-weight:700;}
    </style>
    <!-- Auto redirect to homepage after 3 seconds -->
    <meta http-equiv="refresh" content="3;url=https://toolsfast.online/">
</head>
<body>
    <div class="max-w-sm">
        <div class="w-16 h-16 bg-gradient-to-br from-primary to-accent rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
            <i class="fas fa-bolt text-white text-2xl"></i>
        </div>
        <h1 class="text-3xl font-extrabold text-dark mb-2">404</h1>
        <p class="text-base font-semibold text-dark mb-1">Page Not Found</p>
        <p class="text-sm text-gray-custom mb-4">This page doesn't exist or has been moved.</p>
        <p class="text-sm text-gray-custom mb-4">Redirecting to homepage in <span id="cd" class="countdown">3</span>s...</p>
        <a href="https://toolsfast.online/" class="inline-flex items-center gap-2 px-6 py-3 bg-gradient-to-r from-primary to-primary-dark text-white font-bold rounded-xl shadow-lg hover:from-primary-dark hover:to-primary transition-all text-sm">
            <i class="fas fa-home"></i>Go Home Now
        </a>
        <div class="mt-6 flex flex-wrap justify-center gap-3 text-xs text-gray-custom">
            <a href="https://toolsfast.online/tiktok.html" class="hover:text-primary transition-colors">TikTok</a>
            <a href="https://toolsfast.online/instagram.html" class="hover:text-primary transition-colors">Instagram</a>
            <a href="https://toolsfast.online/facebook.html" class="hover:text-primary transition-colors">Facebook</a>
        </div>
    </div>
    <script>
        let c=3;const el=document.getElementById('cd');
        const t=setInterval(()=>{c--;if(el)el.textContent=c;if(c<=0){clearInterval(t);window.location.href='https://toolsfast.online/';}},1000);
    </script>
</body>
</html>
