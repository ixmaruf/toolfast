<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ToolsFast</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header" id="siteHeader">
        <div class="header-wrap">
            <div class="header-top">
                <div class="header-left">
                    <a href="/" class="site-logo">
                        <img src="images/logo.png" alt="ToolsFast" class="logo-icon">
                        <span class="logo-name">ToolsFast</span>
                    </a>
                </div>
                <div class="header-right">
                    <a href="/" style="font-size:0.82rem;color:var(--accent);font-weight:600;">View Site</a>
                </div>
            </div>
        </div>
    </header>

    <main class="site-main">
        <div class="admin-wrap">
            <div class="admin-header">
                <h1>Editorial Dashboard</h1>
                <p style="color:var(--text-secondary);font-size:0.88rem;margin-top:4px;">Manage articles, SEO settings, and ad configuration.</p>
            </div>

            <!-- Stats -->
            <div class="admin-grid" id="statsGrid">
                <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total Articles</div></div>
                <div class="stat-card"><div class="stat-num" id="statViews">0</div><div class="stat-label">Total Views</div></div>
                <div class="stat-card"><div class="stat-num" id="statFeatured">0</div><div class="stat-label">Featured</div></div>
                <div class="stat-card"><div class="stat-num" id="statCategories">8</div><div class="stat-label">Categories</div></div>
            </div>

            <!-- Create Article Form -->
            <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;margin-bottom:32px;">
                <h2 style="font-size:1.1rem;font-weight:800;margin-bottom:20px;">Create New Article</h2>
                <form id="articleForm">
                    <div class="form-group">
                        <label for="artTitle">Headline</label>
                        <input type="text" id="artTitle" placeholder="Enter article headline..." required>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                        <div class="form-group">
                            <label for="artCategory">Category</label>
                            <select id="artCategory">
                                <option value="world">World</option>
                                <option value="technology">Technology</option>
                                <option value="finance">Finance</option>
                                <option value="politics">Politics</option>
                                <option value="science">Science</option>
                                <option value="health">Health</option>
                                <option value="sports">Sports</option>
                                <option value="ai">AI and Innovation</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="artAuthor">Author</label>
                            <input type="text" id="artAuthor" placeholder="Author name" value="ToolsFast Editorial">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="artExcerpt">Excerpt (160 characters max)</label>
                        <input type="text" id="artExcerpt" maxlength="160" placeholder="Brief summary for search results and social sharing...">
                    </div>
                    <div class="form-group">
                        <label for="artImage">Featured Image URL</label>
                        <input type="url" id="artImage" placeholder="https://images.unsplash.com/...">
                    </div>
                    <div class="form-group">
                        <label for="artTags">Tags (comma separated)</label>
                        <input type="text" id="artTags" placeholder="finance, investing, economy, markets">
                    </div>
                    <div class="form-group">
                        <label for="artContent">Content (HTML)</label>
                        <textarea id="artContent" placeholder="Write your article content in HTML format. Use <h2>, <p>, <ul>, <blockquote> tags for structure..."></textarea>
                    </div>
                    <div style="display:flex;gap:12px;align-items:center;">
                        <label style="display:flex;align-items:center;gap:6px;font-size:0.82rem;cursor:pointer;">
                            <input type="checkbox" id="artFeatured"> Featured
                        </label>
                        <label style="display:flex;align-items:center;gap:6px;font-size:0.82rem;cursor:pointer;">
                            <input type="checkbox" id="artBreaking"> Breaking News
                        </label>
                    </div>
                    <button type="submit" class="btn-primary" style="margin-top:16px;">Publish Article</button>
                    <span id="formStatus" style="margin-left:12px;font-size:0.82rem;color:var(--green);"></span>
                </form>
            </div>

            <!-- Articles List -->
            <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;">
                <h2 style="font-size:1.1rem;font-weight:800;margin-bottom:20px;">Published Articles</h2>
                <div style="overflow-x:auto;">
                    <table class="articles-table">
                        <thead>
                            <tr>
                                <th>Headline</th>
                                <th>Category</th>
                                <th>Author</th>
                                <th>Views</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="articlesBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script>
    const ADMIN = {
        articles: [],
        async init() {
            await this.loadArticles();
            this.renderStats();
            this.renderTable();
            this.setupForm();
        },
        async loadArticles() {
            try {
                const res = await fetch('tables/articles?limit=100&sort=-created_at');
                const data = await res.json();
                this.articles = data.data || [];
            } catch (e) { this.articles = []; }
        },
        renderStats() {
            document.getElementById('statTotal').textContent = this.articles.length;
            document.getElementById('statViews').textContent = formatNumber(this.articles.reduce((s, a) => s + (a.views || 0), 0));
            document.getElementById('statFeatured').textContent = this.articles.filter(a => a.is_featured).length;
        },
        renderTable() {
            const tbody = document.getElementById('articlesBody');
            if (this.articles.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-tertiary);padding:32px;">No articles yet. Create your first article above.</td></tr>';
                return;
            }
            tbody.innerHTML = this.articles.map(a => `
                <tr>
                    <td><a href="article.html?id=${a.id}" style="color:var(--accent);font-weight:600;">${a.title?.substring(0, 60) || 'Untitled'}...</a></td>
                    <td>${getCategoryInfo(a.category).name}</td>
                    <td>${a.author || 'Editorial'}</td>
                    <td>${formatNumber(a.views || 0)}</td>
                    <td>${formatDateShort(a.created_at || new Date().toISOString())}</td>
                    <td><button class="btn-danger" onclick="ADMIN.deleteArticle('${a.id}')">Delete</button></td>
                </tr>
            `).join('');
        },
        setupForm() {
            document.getElementById('articleForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const title = document.getElementById('artTitle').value.trim();
                if (!title) return;

                const content = document.getElementById('artContent').value || '';
                const wordCount = content.replace(/<[^>]*>/g, '').split(/\s+/).filter(w => w).length || 5000;

                const article = {
                    title,
                    category: document.getElementById('artCategory').value,
                    author: document.getElementById('artAuthor').value || 'ToolsFast Editorial',
                    excerpt: document.getElementById('artExcerpt').value || title.substring(0, 160),
                    image: document.getElementById('artImage').value || '',
                    tags: document.getElementById('artTags').value.split(',').map(t => t.trim()).filter(t => t),
                    content,
                    word_count: wordCount,
                    is_featured: document.getElementById('artFeatured').checked,
                    is_breaking: document.getElementById('artBreaking').checked,
                    views: 0,
                    is_viral: false,
                    published_at: new Date().toISOString()
                };

                try {
                    await fetch('tables/articles', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(article)
                    });
                    document.getElementById('formStatus').textContent = 'Article published successfully.';
                    document.getElementById('articleForm').reset();
                    await this.loadArticles();
                    this.renderStats();
                    this.renderTable();
                    setTimeout(() => document.getElementById('formStatus').textContent = '', 3000);
                } catch (e) {
                    document.getElementById('formStatus').textContent = 'Error publishing article.';
                    document.getElementById('formStatus').style.color = 'var(--red)';
                }
            });
        },
        async deleteArticle(id) {
            if (!confirm('Are you sure you want to delete this article?')) return;
            try {
                await fetch(`tables/articles/${id}`, { method: 'DELETE' });
                await this.loadArticles();
                this.renderStats();
                this.renderTable();
            } catch (e) { alert('Error deleting article.'); }
        }
    };
    document.addEventListener('DOMContentLoaded', () => ADMIN.init());
    </script>
</body>
</html>
